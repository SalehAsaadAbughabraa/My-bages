        // =============================================================
        // FUNCTIONS
        // =============================================================
        function showChapter(index) {
            document.querySelectorAll('.content-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('chapter-' + index).classList.add('active');
            document.querySelectorAll('.tab')[index].classList.add('active');
        }

        function toggleAnswer(btn) {
            const box = btn.nextElementSibling;
            if (box.classList.contains('show')) {
                box.classList.remove('show');
                btn.textContent = '📖 إظهار الحل';
                btn.classList.remove('showing');
            } else {
                box.classList.add('show');
                btn.textContent = '📖 إخفاء الحل';
                btn.classList.add('showing');
            }
        }

        function expandAll() {
            const boxes = document.querySelectorAll('.answer-box');
            const btns = document.querySelectorAll('.btn-answer');
            const allShown = boxes.length > 0 && boxes[0].classList.contains('show');

            boxes.forEach((b, i) => {
                if (allShown) {
                    b.classList.remove('show');
                    btns[i].textContent = '📖 إظهار الحل';
                    btns[i].classList.remove('showing');
                } else {
                    b.classList.add('show');
                    btns[i].textContent = '📖 إخفاء الحل';
                    btns[i].classList.add('showing');
                }
            });
        }

        document.getElementById('totalCount').textContent = total;

        // KEYBOARD SHORTCUTS
        // =============================================================
        document.addEventListener('keydown', function(e) {
            const tabs = document.querySelectorAll('.tab');
            const activeIdx = Array.from(tabs).findIndex(t => t.classList.contains('active'));
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                const next = (activeIdx + 1) % tabs.length;
                showChapter(next);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = (activeIdx - 1 + tabs.length) % tabs.length;
                showChapter(prev);
            } else if (e.key === 'Enter') {
                const btn = document.querySelector('.btn-answer:not(.showing)');
                if (btn) btn.click();
            }
