<script>
    // ===== 30 سؤالاً مع صيغ رياضية باستخدام LaTeX =====
    const questions = [
        // ===== أسئلة سهلة (30 ثانية) =====
        {
            question: 'المتتالية العددية هي تابع مجموعة تعريفها هي:',
            options: ['$\\mathbb{R}$ (مجموعة الأعداد الحقيقية)', '$\\mathbb{N}$ (مجموعة الأعداد الطبيعية)', '$\\mathbb{Z}$ (مجموعة الأعداد الصحيحة)', '$\\mathbb{Q}$ (مجموعة الأعداد النسبية)'],
            correct: 1,
            difficulty: 'easy',
            page: 4,
            tip: 'المتتالية هي تابع معرف على $\\mathbb{N}$ أو مجموعة جزئية منها.'
        },
        {
            question: 'في المتتالية $(u_n)$ حيث $n \\ge 2$، أي من التالي هو أول دليل؟',
            options: ['0', '1', '2', '3'],
            correct: 2,
            difficulty: 'easy',
            page: 4,
            tip: '$n_0$ هو أول دليل، وفي هذه المتتالية $n_0 = 2$.'
        },
        {
            question: 'أي من التالي يمثل متتالية معرفة بصيغة صريحة؟',
            options: ['$u_0=1,\\; u_{n+1}=2u_n+1$', '$u_n = 2n + 3$', '$u_0=2,\\; u_{n+1}=u_n^2$', '$u_0=5,\\; u_{n+1}=u_n-3$'],
            correct: 1,
            difficulty: 'easy',
            page: 5,
            tip: 'الصيغة الصريحة تعطي $u_n$ بدلالة $n$ مباشرة، مثل $u_n = 2n + 3$.'
        },
        {
            question: 'أي من التالي يمثل متتالية معرفة بعلاقة تدرجية؟',
            options: ['$u_n = n^2 - 1$', '$u_n = \\frac{n}{n+1}$', '$u_0=1,\\; u_{n+1}=2u_n+1$', '$u_n = 3n - 5$'],
            correct: 2,
            difficulty: 'easy',
            page: 5,
            tip: 'العلاقة التدرجية تعطي $u_{n+1}$ بدلالة $u_n$، مثل $u_{n+1} = 2u_n + 1$.'
        },
        {
            question: 'المتتالية $u_n = 2n + 3$ هي متتالية:',
            options: ['متزايدة تماماً', 'متناقصة تماماً', 'ثابتة', 'غير مضطردة'],
            correct: 0,
            difficulty: 'easy',
            page: 6,
            tip: '$u_{n+1} - u_n = 2 > 0$، إذن المتتالية متزايدة تماماً.'
        },
        {
            question: 'المتتالية $u_n = -3n + 5$ هي متتالية:',
            options: ['متزايدة تماماً', 'متناقصة تماماً', 'ثابتة', 'غير مضطردة'],
            correct: 1,
            difficulty: 'easy',
            page: 6,
            tip: '$u_{n+1} - u_n = -3 < 0$، إذن المتتالية متناقصة تماماً.'
        },
        {
            question: 'المتتالية $u_n = 5$ هي متتالية:',
            options: ['متزايدة تماماً', 'متناقصة تماماً', 'ثابتة', 'غير مضطردة'],
            correct: 2,
            difficulty: 'easy',
            page: 6,
            tip: '$u_{n+1} - u_n = 0$، إذن المتتالية ثابتة.'
        },
        {
            question: 'لدراسة اضطراد متتالية، أي من الطرق التالية هي الأكثر أماناً؟',
            options: ['مقارنة النسبة بالعدد 1', 'دراسة إشارة الفرق $u_{n+1} - u_n$', 'استخدام الدالة المساعدة', 'حساب الحدود الأولى فقط'],
            correct: 1,
            difficulty: 'easy',
            page: 7,
            tip: 'الطريقة الأولى (الفرق) هي الأكثر أماناً وتصلح لجميع المتتاليات.'
        },
        {
            question: 'المتتالية $u_n = (-1)^n$ هي متتالية:',
            options: ['متزايدة تماماً', 'متناقصة تماماً', 'ثابتة', 'متناوبة (غير مضطردة)'],
            correct: 3,
            difficulty: 'easy',
            page: 8,
            tip: 'حدودها تتناوب بين $1$ و $-1$، فإشارة الفرق تتغير، إذن غير مضطردة (متناوبة).'
        },
        {
            question: 'المتتالية $u_n = 7$ هي متتالية:',
            options: ['متزايدة', 'متناقصة', 'ثابتة', 'غير مضطردة'],

            difficulty: 'easy',
            page: 8,
            tip: 'جميع الحدود متساوية، فهي متتالية ثابتة.'
        },
        // ===== أسئلة متوسطة (60 ثانية) =====
        {
            question: 'ما مجال تعريف المتتالية $u_n = \\dfrac{1}{n-3}$؟',

            difficulty: 'medium',

        {
            question: 'المتتالية $u_n = \\dfrac{1}{n}$ هي متتالية:',

            difficulty: 'medium',
            page: 6,
            tip: '$u_{n+1} - u_n = -\\dfrac{1}{n(n+1)} < 0$، فهي متناقصة تماماً.'
        },
        {
            question: 'لماذا لا نستخدم النسبة $\\dfrac{u_{n+1}}{u_n}$ لدراسة اضطراد المتتالية $u_n = (-1)^n$؟',

            correct: 1,
            difficulty: 'medium',
            page: 7,
            tip: 'طريقة النسبة تستخدم فقط عندما تكون جميع الحدود موجبة تماماً.'
        },
        {
            question: 'إذا كانت $f$ دالة متزايدة على $[0, +\\infty[$ والمتتالية $u_n = f(n)$، فإن $(u_n)$ هي:',
            options: ['متزايدة', 'متناقصة', 'ثابتة', 'غير مضطردة'],
            correct: 0,
            difficulty: 'medium',
            page: 7,
            tip: 'اتجاه تغير الدالة هو نفس اتجاه تغير المتتالية.'
        },
        {
            question: 'ما قيمة $u_{100}$ في المتتالية $u_n = (-1)^n$؟',
            options: ['1', '-1', '0', 'غير معرفة'],
            correct: 0,
            difficulty: 'medium',
            page: 8,
            tip: '$100$ عدد زوجي، إذن $(-1)^{100} = 1$.'
        },
        {
            question: 'ما قيمة $u_{101}$ في المتتالية $u_n = (-1)^n + 1$؟',
            options: ['2', '0', '1', '-1'],
            correct: 1,
            difficulty: 'medium',
            page: 8,
            tip: '$101$ عدد فردي، إذن $(-1)^{101} = -1$، و $-1+1=0$.'
        },
        // ===== أسئلة صعبة (90 ثانية) =====

            question: 'ما مجال تعريف المتتالية $u_n = \\dfrac{\\sqrt{n-1}}{n-2}$؟',

        },
        {
            question: 'ما مجال تعريف المتتالية $u_n = \\dfrac{1}{\\sqrt{n^2-4}}$؟',
            options: ['$]-\\infty, -2[ \\cup ]2, +\\infty[$', '$]2, +\\infty[$', '$[-2, 2]$', '$\\mathbb{R} \\setminus \\{-2, 2\\}$'],
            correct: 1,
            difficulty: 'hard',
            page: 4,
            tip: 'شرط الجذر: $n^2-4 > 0$ (لأنه في المقام)، ولأن $n \\in \\mathbb{N}$، النتيجة: $]2, +\\infty[$.'

        {

        {

        },
        {
            question: 'في المتتالية $u_n = (-1)^n \\cdot n$، ما قيمة $u_5$؟',
            options: ['5', '-5', '0', '1'],
            correct: 1,
            difficulty: 'hard',
            page: 8,
            tip: '$5$ عدد فردي، إذن $(-1)^5 = -1$، و $-1 \\times 5 = -5$.'
        },
        {
            question: 'أي من المتتاليات التالية غير مضطردة؟',
            options: ['$u_n = 2n+1$', '$u_n = n^2$', '$u_n = (-1)^n$', '$u_n = \\dfrac{1}{n}$'],
            correct: 2,
            difficulty: 'hard',
            page: 8,
            tip: '$(-1)^n$ متتالية متناوبة، إشارة الفرق تتغير، فهي غير مضطردة.'
        },
        {
            question: 'في المتتالية $u_n = (-1)^n + 2$، ما قيمة $u_{50}$ و $u_{51}$؟',
            options: ['$u_{50}=3,\\; u_{51}=1$', '$u_{50}=1,\\; u_{51}=3$', '$u_{50}=2,\\; u_{51}=2$', '$u_{50}=-1,\\; u_{51}=1$'],
            correct: 0,
            difficulty: 'hard',
            page: 8,
            tip: '$50$ زوجي: $1+2=3$، $51$ فردي: $-1+2=1$.'
        },
        {
            question: 'أي طريقة تصلح لدراسة اضطراد $u_n = \\dfrac{n}{10^n}$؟',
            options: ['الفرق $u_{n+1}-u_n$', 'النسبة $\\dfrac{u_{n+1}}{u_n}$', 'الدالة المساعدة', 'جميع الطرق'],
            correct: 1,
            difficulty: 'hard',
            page: 7,
            tip: 'جميع الحدود موجبة، والنسبة تعطي $\\dfrac{n+1}{10n} < 1$، فهي أفضل طريقة.'
        }
    ];

    // ===== حالة الاختبار =====
    let currentQuestion = 0;
    let score = 0;
    let userAnswers = [];
    let timerInterval = null;
    let timeLeft = 0;
    let isAnswered = false;
    const totalQuestions = questions.length;

    // ===== عناصر DOM =====
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const nextBtn = document.getElementById('nextBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerBox = document.getElementById('timerBox');
    const questionCounter = document.getElementById('questionCounter');
    const progressFill = document.getElementById('progressFill');
    const difficultyBadge = document.getElementById('difficultyBadge');
    const resultBox = document.getElementById('resultBox');
    const quizArea = document.getElementById('quizArea');
    const resultScore = document.getElementById('resultScore');
    const resultPercent = document.getElementById('resultPercent');
    const resultList = document.getElementById('resultList');
    const feedbackText = document.getElementById('feedbackText');

    // ===== دالة لعرض الصيغ باستخدام MathJax =====
    function renderMath(element) {
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([element]).catch(function(err) {
                console.log('MathJax error:', err);
            });
        }
    }

    // ===== دالة عرض السؤال =====
    function loadQuestion(index) {
        const q = questions[index];
        isAnswered = false;
        
        // عرض النص مع الصيغ
        questionText.innerHTML = q.question;
        difficultyBadge.textContent = q.difficulty === 'easy' ? 'سهل' : q.difficulty === 'medium' ? 'متوسط' : 'صعب';
        difficultyBadge.className = 'question-difficulty ' + q.difficulty;
        questionCounter.textContent = `السؤال ${index + 1} من ${totalQuestions}`;
        progressFill.style.width = `${((index) / totalQuestions) * 100}%`;

        optionsContainer.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt;
            btn.dataset.index = i;
            btn.onclick = () => selectOption(i);
            optionsContainer.appendChild(btn);
        });

        // عرض الصيغ
        renderMath(questionText);
        renderMath(optionsContainer);

        const timeMap = { easy: 30, medium: 60, hard: 90 };
        timeLeft = timeMap[q.difficulty] || 30;
        timerDisplay.textContent = formatTime(timeLeft);
        timerBox.style.color = '#1e3c4c';
        clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 1000);

        nextBtn.classList.remove('active');
        nextBtn.textContent = index === totalQuestions - 1 ? 'عرض النتيجة' : 'السؤال التالي';
    }

    // ===== اختيار الإجابة =====
    function selectOption(index) {
        if (isAnswered) return;
        isAnswered = true;
        clearInterval(timerInterval);

        const q = questions[currentQuestion];
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        buttons.forEach((btn, i) => {
            btn.classList.add('disabled');
            btn.disabled = true;
            if (i === q.correct) btn.classList.add('correct');
            if (i === index && i !== q.correct) btn.classList.add('wrong');
            if (i === index) btn.classList.add('selected');
        });

        if (index === q.correct) score++;
        userAnswers[currentQuestion] = {
            selected: index,
            correct: q.correct,
            isCorrect: index === q.correct
        };

        nextBtn.classList.add('active');
    }

    // ===== المؤقت =====
    function updateTimer() {
        timeLeft--;
        timerDisplay.textContent = formatTime(timeLeft);
        if (timeLeft <= 10) timerBox.style.color = '#c62828';
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (!isAnswered) {
                const q = questions[currentQuestion];
                userAnswers[currentQuestion] = {
                    selected: -1,
                    correct: q.correct,
                    isCorrect: false
                };
                const buttons = optionsContainer.querySelectorAll('.option-btn');
                buttons.forEach((btn, i) => {
                    btn.classList.add('disabled');
                    btn.disabled = true;
                    if (i === q.correct) btn.classList.add('correct');
                });
                nextBtn.classList.add('active');
                isAnswered = true;
            }
        }
    }

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // ===== زر التالي =====
    nextBtn.addEventListener('click', function() {
        if (currentQuestion < totalQuestions - 1) {
            currentQuestion++;
            loadQuestion(currentQuestion);
        } else {
            showResult();
        }
    });

    // ===== عرض النتيجة =====
    function showResult() {
        clearInterval(timerInterval);
        quizArea.style.display = 'none';
        resultBox.classList.add('active');

        const percent = Math.round((score / totalQuestions) * 100);
        resultScore.textContent = `${score}/${totalQuestions}`;
        resultPercent.textContent = `${percent}%`;

        let listHtml = '';
        questions.forEach((q, i) => {
            const answer = userAnswers[i];
            if (!answer) {
                listHtml += `<li>السؤال ${i+1}: لم يتم الإجابة عليه</li>`;
                return;
            }
            const status = answer.isCorrect ? '✅' : '❌';
            const statusClass = answer.isCorrect ? 'correct-answer' : 'wrong-answer';
            const correctText = q.options[q.correct];
            const userText = answer.selected !== -1 ? q.options[answer.selected] : 'لم يختر';
            listHtml += `
                <li>
                    <span class="${statusClass}">${status}</span>
                    السؤال ${i+1}: إجابتك: <span class="your-answer">${userText}</span>
                    ${!answer.isCorrect ? ` | الإجابة الصحيحة: <span class="correct-answer">${correctText}</span>` : ''}
                    <br><small style="color:#8f9eaa;">${q.tip}</small>
                </li>
            `;
        });
        resultList.innerHTML = listHtml;
        
        // عرض الصيغ في النتيجة
        renderMath(resultList);

        let feedback = '';
        if (percent === 100) feedback = '🎉 ممتاز! أتقنت جميع المفاهيم. أنت جاهز للانتقال إلى الصفحات التالية. استمر بنفس المستوى!';
        else if (percent >= 80) feedback = '👍 أداء ممتاز! لديك فهم قوي للمفاهيم. راجع الأسئلة التي أخطأت فيها لتعزيز نقاط الضعف.';
        else if (percent >= 60) feedback = '📖 أداء جيد. تحتاج إلى مراجعة بعض المفاهيم الأساسية. ركز على تعريف المتتالية، الاضطراد، والمتتاليات المتناوبة.';
        else if (percent >= 40) feedback = '📚 تحتاج إلى مراجعة أكثر. ارجع إلى الصفحات 1-8 وركز على الأمثلة المحلولة. حاول حل التمارين مرة أخرى.';
        else feedback = '💪 لا تيأس! البداية دائماً صعبة. اقرأ الصفحات من 1 إلى 8 بتمهل، واستخدم القلم والورقة، وحاول فهم كل مثال قبل الانتقال إلى التالي. يمكنك التواصل مع الأستاذ للمساعدة.';
        feedbackText.textContent = feedback;
    }

    // ===== إعادة الاختبار =====
    function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        userAnswers = [];
        isAnswered = false;
        clearInterval(timerInterval);
        quizArea.style.display = 'block';
        resultBox.classList.remove('active');
        loadQuestion(0);
    }

    // ===== بدء الاختبار =====
    loadQuestion(0);
</script>

</body>
</html>
