<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات والذكاء – 30 سؤالاً</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f5f5fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 860px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 35px 25px 35px;
            box-shadow: 0 12px 60px rgba(0, 0, 0, 0.04), 0 2px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid #eeeeff;
            position: relative;
            overflow: hidden;
            min-height: 580px;
        }
        .container::before {
            content: '🌟';
            position: absolute;
            top: 15px;
            left: 140px;
            font-size: 30px;
            opacity: 0.06;
            animation: floatStar 6s ease-in-out infinite;
        }
        .container::after {
            content: '⭐';
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 40px;
            opacity: 0.05;
            animation: floatStar 8s ease-in-out infinite reverse;
        }
        @keyframes floatStar {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(15deg);
            }
            100% {
                transform: translateY(0) rotate(0deg);
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo .icon {
            font-size: 28px;
            color: #fdcb6e;
            animation: wiggle 3s ease-in-out infinite;
        }
        @keyframes wiggle {
            0%,
            100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-10deg);
            }
            75% {
                transform: rotate(10deg);
            }
        }
        .logo .text {
            font-size: 22px;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: 0.5px;
        }
        .logo .text span {
            color: #6c5ce7;
        }
        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .phone-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #25D366;
            color: #fff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
        }
        .phone-link:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.2);
        }
        .phone-link i {
            font-size: 14px;
        }
        .counter {
            font-size: 14px;
            color: #b0b0c0;
            font-weight: 700;
        }
        .counter .current {
            color: #6c5ce7;
            font-size: 18px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6c5ce7, #fdcb6e);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e8e8f0;
            transition: all 0.4s ease;
            cursor: pointer;
            border: none;
        }
        .dot.active {
            background: #6c5ce7;
            width: 28px;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.15);
        }
        .dot.correct {
            background: #00b894;
        }
        .dot.wrong {
            background: #ff7675;
        }
        .question-area {
            animation: fadeSlide 0.5s ease forwards;
            min-height: 280px;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .question-number {
            font-size: 13px;
            font-weight: 700;
            color: #6c5ce7;
            background: #f0edff;
            display: inline-block;
            padding: 3px 16px;
            border-radius: 30px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        .question-text .highlight {
            color: #6c5ce7;
            background: #f0edff;
            padding: 0 6px;
            border-radius: 6px;
        }
        /* ===== الأشكال ===== */
        .shape-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 8px 0 12px 0;
            padding: 12px;
            background: #f8f8fc;
            border-radius: 16px;
            border: 2px solid #e8e8f0;
        }
        .shape-item {
            text-align: center;
        }
        .shape-grid-mini {
            display: grid;
            grid-template-columns: repeat(2, 38px);
            grid-template-rows: repeat(2, 38px);
            gap: 2px;
            background: #6c5ce7;
            padding: 3px;
            border-radius: 8px;
            margin: 0 auto;
        }
        .shape-grid-mini .cell {
            background: #ffffff;
            border-radius: 3px;
        }
        .shape-grid-mini .cell.gray {
            background: #b0b0c0;
        }
        .shape-grid-mini .cell.black {
            background: #1a1a2e;
            border-radius: 50%;
        }
        .shape-grid-mini .cell.white {
            background: #ffffff;
            border: 1px solid #ddd;
        }
        .shape-label {
            font-size: 12px;
            color: #b0b0c0;
            font-weight: 600;
            margin-top: 3px;
        }
        /* ===== شبكة للمربعات ===== */
        .grid-display {
            display: flex;
            justify-content: center;
            margin: 8px 0 12px 0;
        }
        .grid-box {
            display: grid;
            gap: 2px;
            background: #6c5ce7;
            padding: 3px;
            border-radius: 8px;
        }
        .grid-box .g-cell {
            background: #ffffff;
            border-radius: 3px;
        }
        .grid-box.grid-3 {
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
        }
        .grid-box.grid-2 {
            grid-template-columns: repeat(2, 50px);
            grid-template-rows: repeat(2, 50px);
        }
        /* ===== SVG للمساحات المظللة ===== */
        .svg-container {
            display: flex;
            justify-content: center;
            margin: 6px 0 10px 0;
        }
        .svg-container svg {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            background: #fafafa;
            border: 1px solid #eee;
        }
        /* ===== الخيارات النصية ===== */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .option-btn {
            background: #f8f8fc;
            border: 2px solid #eeeeff;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            color: #2d2d44;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Tajawal', sans-serif;
            position: relative;
        }
        .option-btn .letter {
            color: #6c5ce7;
            font-size: 15px;
            min-width: 26px;
            font-weight: 800;
        }
        .option-btn:hover:not(.disabled) {
            background: #f0edff;
            border-color: #6c5ce7;
            transform: translateX(-3px);
        }
        .option-btn.selected {
            border-color: #6c5ce7;
            background: #f0edff;
        }
        .option-btn.correct {
            border-color: #00b894;
            background: #e6f9f4;
            color: #00b894;
            animation: popCorrect 0.5s ease;
        }
        .option-btn.correct .letter {
            color: #00b894;
        }
        .option-btn.wrong {
            border-color: #ff7675;
            background: #fde8e8;
            color: #d63031;
            animation: shake 0.5s ease;
        }
        .option-btn.wrong .letter {
            color: #d63031;
        }
        .option-btn.disabled {
            cursor: default;
            opacity: 0.5;
        }
        /* ===== خيارات الأشكال ===== */
        .options-shapes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .option-shape {
            background: #f8f8fc;
            border: 2px solid #eeeeff;
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }
        .option-shape:hover:not(.disabled) {
            background: #f0edff;
            border-color: #6c5ce7;
            transform: scale(1.02);
        }
        .option-shape .label {
            font-size: 14px;
            font-weight: 700;
            color: #6c5ce7;
            margin-bottom: 4px;
        }
        .option-shape .mini-grid {
            display: grid;
            grid-template-columns: repeat(2, 30px);
            grid-template-rows: repeat(2, 30px);
            gap: 2px;
            background: #6c5ce7;
            padding: 3px;
            border-radius: 6px;
            margin: 0 auto;
            width: fit-content;
        }
        .option-shape .mini-grid .c {
            background: #ffffff;
            border-radius: 3px;
        }
        .option-shape .mini-grid .c.gray {
            background: #b0b0c0;
        }
        .option-shape .mini-grid .c.black {
            background: #1a1a2e;
            border-radius: 50%;
        }
        .option-shape .mini-grid .c.white {
            background: #ffffff;
            border: 1px solid #ddd;
        }
        .option-shape.selected {
            border-color: #6c5ce7;
            background: #f0edff;
        }
        .option-shape.correct {
            border-color: #00b894;
            background: #e6f9f4;
        }
        .option-shape.wrong {
            border-color: #ff7675;
            background: #fde8e8;
            animation: shake 0.5s ease;
        }
        .option-shape.disabled {
            cursor: default;
            opacity: 0.5;
        }
        @keyframes popCorrect {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes shake {
            0% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
            100% {
                transform: translateX(0);
            }
        }
        /* ===== التغذية الراجعة ===== */
        .feedback {
            padding: 12px 18px;
            border-radius: 12px;
            margin-top: 4px;
            font-size: 16px;
            font-weight: 700;
            display: none;
            animation: fadeSlide 0.4s ease forwards;
            line-height: 1.8;
        }
        .feedback.show {
            display: block;
        }
        .feedback.success {
            background: #e6f9f4;
            border-right: 4px solid #00b894;
            color: #1a6b4a;
        }
        .feedback.error {
            background: #fde8e8;
            border-right: 4px solid #ff7675;
            color: #b71c1c;
        }
        .feedback .fb-icon {
            font-size: 20px;
            margin-left: 8px;
        }
        .feedback .solution {
            font-weight: 400;
            color: #2d2d44;
            margin-top: 4px;
            font-size: 15px;
        }
        .feedback .solution strong {
            color: #6c5ce7;
        }
        /* ===== الأزرار ===== */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .controls .score-display {
            font-size: 14px;
            color: #b0b0c0;
            font-weight: 700;
        }
        .controls .score-display .num {
            color: #fdcb6e;
            font-size: 18px;
        }
        .controls .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .controls .nav-btn {
            background: #f8f8fc;
            border: 2px solid #eeeeff;
            color: #b0b0c0;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .controls .nav-btn:hover:not(:disabled) {
            background: #f0edff;
            border-color: #6c5ce7;
            color: #6c5ce7;
        }
        .controls .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .controls .nav-btn.primary {
            background: #6c5ce7;
            border-color: #6c5ce7;
            color: #fff;
        }
        .controls .nav-btn.primary:hover:not(:disabled) {
            background: #5a4bd1;
            border-color: #5a4bd1;
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
        }
        /* ===== شاشة النتيجة ===== */
        .result-screen {
            display: none;
            text-align: center;
            padding: 20px 10px 10px 10px;
            animation: fadeSlide 0.8s ease forwards;
        }
        .result-screen.show {
            display: block;
        }
        .result-screen .emoji-big {
            font-size: 70px;
            margin-bottom: 6px;
            animation: bounceEmoji 1.2s ease infinite;
        }
        @keyframes bounceEmoji {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        .result-screen .title {
            font-size: 30px;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .result-screen .subtitle {
            font-size: 17px;
            color: #b0b0c0;
            margin-bottom: 14px;
        }
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 450px;
            margin: 0 auto 16px auto;
        }
        .stat-card {
            background: #f8f8fc;
            border-radius: 14px;
            padding: 14px 8px;
            transition: all 0.3s;
        }
        .stat-card .num {
            font-size: 28px;
            font-weight: 900;
            display: block;
        }
        .stat-card .label {
            font-size: 12px;
            color: #b0b0c0;
            font-weight: 500;
        }
        .stat-card.correct .num {
            color: #00b894;
        }
        .stat-card.wrong .num {
            color: #ff7675;
        }
        .stat-card.score .num {
            color: #fdcb6e;
        }
        .result-screen .result-message {
            font-size: 17px;
            color: #2d2d44;
            margin-bottom: 14px;
            line-height: 1.8;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .result-screen .restart-btn {
            background: #6c5ce7;
            border: none;
            color: #fff;
            padding: 10px 36px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
        }
        .result-screen .restart-btn:hover {
            background: #5a4bd1;
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.2);
        }
        .whatsapp-footer {
            margin-top: 12px;
            font-size: 13px;
            color: #b0b0c0;
        }
        .whatsapp-footer a {
            color: #25D366;
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 700px) {
            .container {
                padding: 18px 14px 16px 14px;
                border-radius: 20px;
            }
            .question-text {
                font-size: 19px;
            }
            .options-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .options-shapes {
                grid-template-columns: 1fr 1fr;
            }
            .option-btn {
                font-size: 14px;
                padding: 10px 12px;
            }
            .shape-grid-mini {
                grid-template-columns: repeat(2, 30px);
                grid-template-rows: repeat(2, 30px);
            }
            .option-shape .mini-grid {
                grid-template-columns: repeat(2, 24px);
                grid-template-rows: repeat(2, 24px);
            }
            .grid-box.grid-3 {
                grid-template-columns: repeat(3, 38px);
                grid-template-rows: repeat(3, 38px);
            }
            .grid-box.grid-2 {
                grid-template-columns: repeat(2, 38px);
                grid-template-rows: repeat(2, 38px);
            }
            .logo .text {
                font-size: 18px;
            }
            .result-stats {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .stat-card .num {
                font-size: 22px;
            }
            .header {
                flex-direction: column;
                align-items: center;
            }
            .header-info {
                width: 100%;
                justify-content: center;
            }
            .controls {
                flex-direction: column;
                align-items: center;
            }
            .controls .nav-buttons {
                width: 100%;
                justify-content: center;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 10px 8px 12px 8px;
            }
            .question-text {
                font-size: 16px;
            }
            .options-grid {
                grid-template-columns: 1fr;
            }
            .options-shapes {
                grid-template-columns: 1fr;
            }
            .option-btn {
                font-size: 13px;
                padding: 8px 10px;
            }
            .shape-grid-mini {
                grid-template-columns: repeat(2, 24px);
                grid-template-rows: repeat(2, 24px);
            }
            .option-shape .mini-grid {
                grid-template-columns: repeat(2, 20px);
                grid-template-rows: repeat(2, 20px);
            }
            .grid-box.grid-3 {
                grid-template-columns: repeat(3, 30px);
                grid-template-rows: repeat(3, 30px);
            }
            .grid-box.grid-2 {
                grid-template-columns: repeat(2, 30px);
                grid-template-rows: repeat(2, 30px);
            }
            .result-stats {
                grid-template-columns: 1fr;
            }
            .phone-link {
                font-size: 10px;
                padding: 3px 10px;
            }
            .counter {
                font-size: 12px;
            }
            .shape-display {
                gap: 6px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- ===== الهيدر ===== -->
        <div class="header">
            <div class="logo">
                <span class="icon">✦</span>
                <span class="text">Loly <span>Math</span></span>
            </div>
            <div class="header-info">
                <a href="tel:0965292099" class="phone-link">
                    <i class="fas fa-phone-alt"></i> 0965292099
                </a>
                <span class="counter">
                    <span class="current" id="currentQ">١</span> / ٣٠
                </span>
            </div>
        </div>

        <!-- ===== شريط التقدم ===== -->
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>

        <!-- ===== نقاط التقدم ===== -->
        <div class="progress-dots" id="dotsContainer"></div>

        <!-- ===== منطقة السؤال ===== -->
        <div class="question-area" id="questionArea">

            <div class="question-number" id="qNumber">السؤال الأول</div>
            <div class="question-text" id="qText">جاري التحميل...</div>

            <div id="shapeContainer"></div>
            <div id="optionsContainer"></div>

            <div class="feedback" id="feedback"></div>

        </div>

        <!-- ===== شاشة النتيجة ===== -->
        <div class="result-screen" id="resultScreen">
            <div class="emoji-big" id="resultEmoji">🎉</div>
            <div class="title" id="resultTitle">أحسنت!</div>
            <div class="subtitle" id="resultSubtitle">لقد أنهيت الاختبار بنجاح</div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-stats">
                <div class="stat-card correct">
                    <span class="num" id="resultCorrect">٠</span>
                    <span class="label">✔️ صحيحة</span>
                </div>
                <div class="stat-card wrong">
                    <span class="num" id="resultWrong">٠</span>
                    <span class="label">✖️ خاطئة</span>
                </div>
                <div class="stat-card score">
                    <span class="num" id="resultScore">٠%</span>
                    <span class="label">⭐ النتيجة</span>
                </div>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">
                <i class="fas fa-redo"></i> إعادة الاختبار
            </button>
            <div class="whatsapp-footer">
                <i class="fab fa-whatsapp" style="color:#25D366;"></i>
                للتواصل: <a href="https://wa.me/0965292099">0965292099</a>
            </div>
        </div>

        <!-- ===== أزرار التحكم ===== -->

        // ================================================================
        // التعامل مع الخيارات النصية
        // ================================================================
        function handleTextOptionClick(selectedIndex, question) {
            if (answered) return;
            const isCorrect = selectedIndex === question.correct;

            const allOptions = document.querySelectorAll('.option-btn');
            allOptions.forEach((btn, i) => {
                btn.classList.add('disabled');
                if (i === question.correct) btn.classList.add('correct');
                if (i === selectedIndex && !isCorrect) btn.classList.add('wrong');
                if (i === selectedIndex) btn.classList.add('selected');
            });

            showFeedback(isCorrect, question);
            updateScore(isCorrect);
            answered = true;
            updateDots();
            progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
        }

        // ================================================================
        // التعامل مع الخيارات الشكلية
        // ================================================================
        function handleShapeOptionClick(selectedIndex, question) {
            if (answered) return;
            const isCorrect = selectedIndex === question.correct;

            const allOptions = document.querySelectorAll('.option-shape');
            allOptions.forEach((btn, i) => {
                btn.classList.add('disabled');
                if (i === question.correct) btn.classList.add('correct');
                if (i === selectedIndex && !isCorrect) btn.classList.add('wrong');
                if (i === selectedIndex) btn.classList.add('selected');
            });

            showFeedback(isCorrect, question);
            updateScore(isCorrect);
            answered = true;
            updateDots();
            progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
        }

        // ================================================================
        // عرض التغذية الراجعة
        // ================================================================
        function showFeedback(isCorrect, question) {
            const letters = ['أ', 'ب', 'ج', 'د'];
            if (isCorrect) {
                feedback.className = 'feedback show success';
                feedback.innerHTML = `
                            <span class="fb-icon">✅</span> أحسنت! 🎉 إجابة صحيحة!
                            <div class="solution">📖 ${question.explanation}</div>
                        `;
            } else {
                feedback.className = 'feedback show error';
                feedback.innerHTML = `
                            <span class="fb-icon">💪</span> حاول مرة أخرى! لا تيأس، الممارسة تصنع الإتقان.
                            <div class="solution">📖 الإجابة الصحيحة هي: <strong>${letters[question.correct]}</strong> - ${question.explanation}</div>
                        `;
            }
        }

        // ================================================================
        // تحديث النتيجة
        // ================================================================
        function updateScore(isCorrect) {
            if (isCorrect) {
                score++;
                liveScore.textContent = score;
            }
            answers[currentIndex] = isCorrect;
        }

        // ================================================================
        // عرض السؤال
        // ================================================================
        function renderQuestion(index) {
            const q = questions[index];
            if (!q) return;

            qNumber.textContent = `السؤال ${q.id}`;
            qText.innerHTML = q.text;

            renderShapes(q);
            renderOptions(q);

            feedback.className = 'feedback';
            feedback.style.display = 'none';
            answered = false;

            progressFill.style.width = `${((index + 1) / questions.length) * 100}%`;
            currentQ.textContent = index + 1;

            prevBtn.disabled = index === 0;
            if (index === questions.length - 1) {
                nextBtn.innerHTML = '<i class="fas fa-check"></i> إنهاء';
            } else {
                nextBtn.innerHTML = 'التالي <i class="fas fa-chevron-left"></i>';
            }

            updateDots();
        }

        // ================================================================
        // النقاط
        // ================================================================
        function updateDots() {
            dotsContainer.innerHTML = '';
            questions.forEach((q, i) => {
                const dot = document.createElement('span');
                dot.className = 'dot';
                if (i === currentIndex) dot.classList.add('active');
                if (answers[i] === true) dot.classList.add('correct');
                else if (answers[i] === false) dot.classList.add('wrong');
                dot.addEventListener('click', () => goToQuestion(i));
                dotsContainer.appendChild(dot);
            });
        }

        // ================================================================
        // الانتقال
        // ================================================================
        function goToQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            currentIndex = index;
            renderQuestion(index);
        }

        function nextQuestion() {
            if (!answered && currentIndex < questions.length - 1) {
                feedback.className = 'feedback show error';
                feedback.innerHTML = '<span class="fb-icon">⚠️</span> يرجى اختيار إجابة أولاً!';
                return;
            }
            if (currentIndex === questions.length - 1) {
                finishQuiz();
                return;
            }
            currentIndex++;
            renderQuestion(currentIndex);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        }

        // ================================================================
        // إنهاء الاختبار
        // ================================================================
        function finishQuiz() {
            quizCompleted = true;
            questionArea.style.display = 'none';
            controls.style.display = 'none';
            resultScreen.classList.add('show');

            const total = questions.length;
            const correct = score;
            const wrong = total - correct;
            const percentage = Math.round((correct / total) * 100);

            document.getElementById('resultCorrect').textContent = correct;
            document.getElementById('resultWrong').textContent = wrong;
            document.getElementById('resultScore').textContent = `${percentage}%`;

            let emoji, title, message;
            if (percentage >= 90) {
                emoji = '🏆';
                title = 'ممتاز!';
                message = 'أنت عبقري! لقد أتقنت جميع المهارات. استمر في التألق، أنت في الطريق الصحيح لتصبح من المتفوقين! 🌟';
                createConfetti();
            } else if (percentage >= 75) {
                emoji = '🌟';
                title = 'جيد جداً!';
                message = 'أداء رائع! مع القليل من التدريب الإضافي، ستصبح مثالياً. لا تتوقف عن التعلم! 💪';
                createConfetti();
            } else if (percentage >= 50) {
                emoji = '💪';
                title = 'جيد!';
                message = 'لديك أساس جيد، لكن هناك مجال للتحسين. راجع الأخطاء وكرر المحاولة، ستحقق نتائج أفضل! 📚';
            } else {
                emoji = '📖';
                title = 'تحتاج إلى ممارسة أكثر!';
                message = 'لا تيأس! كلنا نتعلم من أخطائنا. راجع الدروس جيداً، ثم عد وحاول مرة أخرى. أنت قادر على التحسن! 💪';
            }

            document.getElementById('resultEmoji').textContent = emoji;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
        }

        // ================================================================
        // كونفيتي
        // ================================================================
        function createConfetti() {
            const colors = ['#fdcb6e', '#6c5ce7', '#00b894', '#fd79a8', '#74b9ff', '#ff7675'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.style.cssText = `
                            position: fixed;
                            width: ${Math.random()*6+4}px;
                            height: ${Math.random()*6+4}px;
                            background: ${colors[Math.floor(Math.random()*colors.length)]};
                            left: ${Math.random()*100}vw;
                            top: -20px;
                            border-radius: ${Math.random()>0.5?'50%':'2px'};
                            pointer-events: none;
                            z-index: 9999;
                            animation: confettiFall ${Math.random()*3+2}s linear forwards;
                            animation-delay: ${Math.random()*0.5}s;
                        `;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 5000);
            }
        }

        // ================================================================
        // إعادة التشغيل
        // ================================================================
        function restartQuiz() {
            currentIndex = 0;
            answers = [];
            score = 0;
            answered = false;
            quizCompleted = false;

            resultScreen.classList.remove('show');
            questionArea.style.display = 'block';
            controls.style.display = 'flex';
            liveScore.textContent = '0';
            renderQuestion(0);
        }

        // ================================================================
        // أنماط الكونفيتي
        // ================================================================
        const styleConfetti = document.createElement('style');
        styleConfetti.textContent = `
                    @keyframes confettiFall {
                        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
                    }
                `;
        document.head.appendChild(styleConfetti);

        // ================================================================
        // ربط الأزرار
        // ================================================================
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);

        document.addEventListener('keydown', function(e) {
            if (quizCompleted) {
                if (e.key === 'r' || e.key === 'R') restartQuiz();
                return;
            }
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft') prevQuestion();
            if (e.key >= '1' && e.key <= '4') {
                const btns = document.querySelectorAll('.option-btn:not(.disabled), .option-shape:not(.disabled)');
                if (btns[e.key - 1]) btns[e.key - 1].click();
            }
        });

        renderQuestion(0);
    </script>

</body>
</html>
